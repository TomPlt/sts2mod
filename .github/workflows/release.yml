name: Release Mod

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Update mod_manifest.json version
        run: |
          jq --arg v "${{ steps.version.outputs.version }}" '.version = $v' \
            mods/SpireOracle/mod_manifest.json > /tmp/manifest.json
          mv /tmp/manifest.json mods/SpireOracle/mod_manifest.json

      - name: Package release zip
        run: |
          cd mods/SpireOracle
          zip /tmp/SpireOracle-${{ github.ref_name }}.zip \
            SpireOracle.dll \
            mod_manifest.json \
            overlay_data.json \
            sts2_reference.json \
            config.example.json \
            setup.bat \
            README.txt

      - name: Create GitHub Release
        run: |
          gh release create ${{ github.ref_name }} \
            /tmp/SpireOracle-${{ github.ref_name }}.zip \
            --title "Spire Oracle ${{ github.ref_name }}" \
            --generate-notes
        env:
          GH_TOKEN: ${{ github.token }}
